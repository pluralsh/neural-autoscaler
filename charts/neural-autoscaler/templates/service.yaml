{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neural-autoscaler.fullname" . }}-metrics
  labels:
    {{- include "neural-autoscaler.labels" . | nindent 4 }}
spec:
  ports:
  - name: metrics
    port: {{ .Values.metrics.port }}
    protocol: TCP
    targetPort: metrics
  selector:
    {{- include "neural-autoscaler.selectorLabels" . | nindent 4 }}
{{- end }}
