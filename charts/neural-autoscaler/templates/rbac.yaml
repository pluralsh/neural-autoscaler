apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "neural-autoscaler.fullname" . }}-manager-role
  labels:
    {{- include "neural-autoscaler.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods/resize
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling.plural.sh
  resources:
  - neuralautoscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autoscaling.plural.sh
  resources:
  - neuralautoscalers/finalizers
  verbs:
  - update
- apiGroups:
  - autoscaling.plural.sh
  resources:
  - neuralautoscalers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - metrics.k8s.io
  resources:
  - pods
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "neural-autoscaler.fullname" . }}-manager-rolebinding
  labels:
    {{- include "neural-autoscaler.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "neural-autoscaler.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "neural-autoscaler.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
