{{- $modelPath := .Values.modelPath | default (include "neural-autoscaler.defaultModelPath" .) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neural-autoscaler.fullname" . }}
  labels:
    app.kubernetes.io/component: manager
    {{- include "neural-autoscaler.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "neural-autoscaler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/component: manager
        {{- include "neural-autoscaler.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "neural-autoscaler.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: manager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /manager
        args:
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:{{ .Values.metrics.port }}
        {{- if .Values.leaderElect }}
        - --leader-elect
        {{- end }}
        - --model-path={{ $modelPath }}
        {{- if gt (int .Values.logLevel) 0 }}
        - -v={{ .Values.logLevel }}
        {{- end }}
        {{- with .Values.manager.args }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        - name: MODEL_PATH
          value: {{ $modelPath | quote }}
        {{- if .Values.modelFamily }}
        - name: FORECAST_MODEL_FAMILY
          value: {{ .Values.modelFamily | quote }}
        {{- end }}
        {{- with .Values.manager.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: {{ .Values.metrics.port }}
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
